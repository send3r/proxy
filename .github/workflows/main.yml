name: SOCKS5 Proxy (Cloudflare)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Çalışma süresi'
        required: true
        default: '2h'

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          wget -q https://github.com/jpillora/chisel/releases/latest/download/chisel_1.11.5_linux_amd64.gz -O chisel.gz
          gzip -d chisel.gz && sudo mv chisel /usr/local/bin/ && chmod +x /usr/local/bin/chisel

          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Start Proxy
        run: |
          chisel server --socks5 --port 1080 > /dev/null 2>&1 &
          echo "✅ SOCKS5 Proxy (1080) aktif"

          echo "🌐 Cloudflare Tunnel Başlıyor..."
          echo "--------------------------------------------------"
          timeout ${{ github.event.inputs.duration }} cloudflared tunnel --url tcp://localhost:1080 --no-autoupdate --log-level info
